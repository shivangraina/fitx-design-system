<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitX — Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--fx-bg); font-family: var(--fx-font-body); padding: 28px; color: var(--fx-fg-1); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100px; height: 70px; background: var(--fx-white); border-radius: 12px; }
  .name { font-size: 12px; font-family: var(--fx-font-display); font-weight: 600; }
  .meta { font-size: 10px; color: var(--fx-fg-3); text-align: center; line-height: 1.3; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(31,24,15,0.04)"></div><div class="name">xs</div><div class="meta">subtle lift</div></div>
  <div class="item"><div class="box" style="box-shadow:0 2px 6px rgba(31,24,15,0.06)"></div><div class="name">sm ★</div><div class="meta">resting cards</div></div>
  <div class="item"><div class="box" style="box-shadow:0 6px 16px rgba(31,24,15,0.08)"></div><div class="name">md</div><div class="meta">card hover</div></div>
  <div class="item"><div class="box" style="box-shadow:0 16px 36px rgba(31,24,15,0.10)"></div><div class="name">lg</div><div class="meta">menus, popovers</div></div>
  <div class="item"><div class="box" style="box-shadow:0 28px 60px rgba(31,24,15,0.14)"></div><div class="name">xl</div><div class="meta">modals</div></div>
</div>
</body>
</html>
