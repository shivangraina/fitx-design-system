<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitX — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--fx-bg); font-family: var(--fx-font-body); padding: 24px; color: var(--fx-fg-1); }
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .lbl { width: 48px; font-size: 11px; color: var(--fx-fg-3); font-variant-numeric: tabular-nums; letter-spacing: 0.03em; }
  .px { width: 50px; font-size: 12px; font-family: var(--fx-font-num); color: var(--fx-fg-1); }
  .bar { height: 12px; background: var(--fx-saffron-400); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">space-1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="lbl">space-2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl">space-3</span><span class="px">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="lbl">space-4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lbl">space-6</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lbl">space-8</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lbl">space-12</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="lbl">space-16</span><span class="px">64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="lbl">space-24</span><span class="px">96</span><span class="bar" style="width:96px"></span></div>
</body>
</html>
