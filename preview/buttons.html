<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitX — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--fx-bg); font-family: var(--fx-font-body); padding: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 14px; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fx-stone-500); font-weight: 600; width: 100%; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Primary · Secondary · Outline · Ghost</span>
    <button class="fx-btn fx-btn-primary">Start your plan</button>
    <button class="fx-btn fx-btn-secondary">Talk to a coach</button>
    <button class="fx-btn fx-btn-outline">See programs</button>
    <button class="fx-btn fx-btn-ghost">Skip</button>
  </div>
  <div class="row"><span class="lbl">Sizes &amp; pill</span>
    <button class="fx-btn fx-btn-primary fx-btn-sm">Small</button>
    <button class="fx-btn fx-btn-primary">Default</button>
    <button class="fx-btn fx-btn-primary fx-btn-lg">Large</button>
    <button class="fx-btn fx-btn-primary fx-btn-pill">Enrol now</button>
  </div>
</body>
</html>
