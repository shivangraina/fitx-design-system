<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitX — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--fx-bg); font-family: var(--fx-font-body); padding: 24px; color: var(--fx-fg-1); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape { width: 88px; height: 70px; background: var(--fx-forest-500); border: 1.5px solid var(--fx-forest-600); }
  .name { font-size: 12px; font-family: var(--fx-font-display); font-weight: 600; }
  .meta { font-size: 10px; color: var(--fx-fg-3); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="shape" style="border-radius:4px"></div><div class="name">xs</div><div class="meta">4 · chips</div></div>
  <div class="item"><div class="shape" style="border-radius:8px"></div><div class="name">sm</div><div class="meta">8 · btn/input</div></div>
  <div class="item"><div class="shape" style="border-radius:12px"></div><div class="name">md ★</div><div class="meta">12 · cards</div></div>
  <div class="item"><div class="shape" style="border-radius:20px"></div><div class="name">lg</div><div class="meta">20 · features</div></div>
  <div class="item"><div class="shape" style="border-radius:28px"></div><div class="name">xl</div><div class="meta">28 · hero</div></div>
  <div class="item"><div class="shape" style="border-radius:9999px"></div><div class="name">pill</div><div class="meta">badges</div></div>
</div>
</body>
</html>
