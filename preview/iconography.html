<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitX — Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--fx-bg); font-family: var(--fx-font-body); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .icon { background: var(--fx-white); border-radius: 10px; aspect-ratio: 1; display: grid; place-items: center; box-shadow: var(--fx-shadow-xs); }
  .icon svg { width: 22px; height: 22px; stroke: var(--fx-ink-900); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .icon.active svg { stroke: var(--fx-saffron-400); }
  .icon.muted svg { stroke: var(--fx-stone-500); }
  .meta { margin-top: 10px; font-size: 11px; color: var(--fx-fg-3); }
  .lbl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fx-stone-500); font-weight: 600; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="lbl">Lucide · 1.75 stroke · 24px · currentColor</div>
<div class="grid">
  <!-- dumbbell -->
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11"/><path d="M21 21l-1-1"/><path d="M3 3l1 1"/><path d="M18 22l4-4"/><path d="M2 6l4-4"/><path d="M3 10l7-7"/><path d="M14 21l7-7"/></svg></div>
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M19 14c1.5-2.5 3-4 3-7a3 3 0 0 0-6 0c0 1.4.9 2.7 2 3.5"/><path d="M3 21h18"/><path d="M3 17a4 4 0 0 1 4-4h10"/><path d="M9 3v2"/><path d="M9 13V9"/></svg></div>
  <div class="icon active"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg></div>
  <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
  <div class="icon muted"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg></div>
</div>
<div class="meta">Outline default · Saffron when active · Stone when muted/inactive · Filled only for selected tabs</div>
</body>
</html>
