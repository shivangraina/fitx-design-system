<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitX — Type: Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--fx-bg); font-family: var(--fx-font-body); padding: 28px; color: var(--fx-fg-1); }
  .specimen { font-family: var(--fx-font-display); font-weight: 500; font-size: 64px; line-height: 1.05; letter-spacing: -0.02em; color: var(--fx-forest-600); font-optical-sizing: auto; }
  .it { font-style: italic; }
  .meta { margin-top: 14px; display: flex; gap: 18px; font-size: 12px; color: var(--fx-fg-3); }
  .meta b { color: var(--fx-fg-1); font-weight: 600; }
  .eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fx-stone-500); font-weight: 600; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="eyebrow">Display · Headlines</div>
<div class="specimen">Strength for <span class="it">every</span> stage.</div>
<div class="meta"><span><b>Fraunces</b></span><span>500 · Medium</span><span>opsz auto</span><span>letter-spacing −0.02em</span><span>line-height 1.05</span></div>
</body>
</html>
