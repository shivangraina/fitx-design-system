<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitX — Mobile App UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #2A2522; min-height: 100vh; font-family: var(--fx-font-body); }
  .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .label {
    position: fixed; top: 16px; left: 16px; color: #FCF8EF;
    font-family: var(--fx-font-display); font-weight: 600; font-size: 16px;
    background: rgba(0,0,0,0.4); padding: 8px 14px; border-radius: 99px;
    backdrop-filter: blur(10px);
  }
  .scrollwrap { height: 100%; overflow-y: auto; }
  .scrollwrap::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="label">FitX App · Click bottom tabs to navigate</div>
<div class="stage" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    const [tab, setTab] = useState('home');
    const [view, setView] = useState('home'); // home | workout | meals | coach | you

    const goto = (t) => { setTab(t); setView(t); };

    const screen = (() => {
      if (view === 'workout') return <HomeWorkoutWrap onBack={() => setView('home')} />;
      if (view === 'meals') return <MealsScreen onBack={() => goto('home')} />;
      if (view === 'coach') return <CoachScreen />;
      if (view === 'you') return <YouScreen />;
      return <HomeScreen onOpenWorkout={() => setView('workout')} onOpenMeal={() => goto('meals')} goto={goto} />;
    })();

    return (
      <IOSDevice width={390} height={844}>
        <div style={{ position: 'relative', width: '100%', height: '100%', background: 'var(--fx-bg)', overflow: 'hidden' }}>
          <div className="scrollwrap" style={{ position: 'absolute', inset: 0, paddingBottom: 0 }}>
            {screen}
          </div>
          <FxTabBar active={tab} onChange={goto} />
        </div>
      </IOSDevice>
    );
  }

  function HomeWorkoutWrap({ onBack }) {
    return <WorkoutScreen onBack={onBack} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
