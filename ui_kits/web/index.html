<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitX — Home Fitness & Nutrition</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--fx-cream-200); color: var(--fx-fg-1); font-family: var(--fx-font-body); -webkit-text-size-adjust: 100%; }
  html, body { overflow-x: hidden; }
  *, *::before, *::after { box-sizing: border-box; }

  /* Mobile overrides — the kit uses React inline styles for desktop, override via attribute selectors. */
  @media (max-width: 760px) {
    /* Container max-widths and side padding */
    div[style*="max-width: 1200"] {
      max-width: 100% !important;
      padding-left: 16px !important;
      padding-right: 16px !important;
    }

    /* Sticky nav: shrink height, hide desktop link list, keep buttons */
    header > div[style*="height: 72"] { height: 60px !important; }
    header > div nav[style*="display: flex"] { display: none !important; }
    header > div div[style*="display: flex"][style*="gap: 10"] { gap: 8px !important; }

    /* Default: collapse any inline multi-column grid to a single column */
    div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
      gap: 20px !important;
    }
    /* Conditions block (4-col cards) — 2 columns reads better than 1 */
    div[style*="repeat(4, 1fr)"] {
      grid-template-columns: 1fr 1fr !important;
      gap: 10px !important;
    }

    /* Trim section paddings */
    section[style*="padding: 96px 0"],
    section[style*="padding: 80px 0"],
    section[style*="padding: 120px 0"] {
      padding-top: 48px !important;
      padding-bottom: 48px !important;
    }
    section[style*="padding: 64px 0"],
    footer[style*="padding: 64px 0"] {
      padding-top: 40px !important;
      padding-bottom: 24px !important;
    }

    /* Hero / display headlines: scale typography down */
    h1.fx-display, .fx-display { font-size: 40px !important; line-height: 1.05 !important; }
    h2.fx-h2, .fx-h2 { font-size: 28px !important; line-height: 1.15 !important; }
    .fx-lead { font-size: 16px !important; }

    /* Anything with maxWidth on inner copy — let it fill the column */
    p[style*="max-width: 520"], p[style*="max-width: 480"], p[style*="max-width: 720"], p[style*="max-width: 640"],
    h2[style*="max-width: 720"], div[style*="max-width: 320"] {
      max-width: 100% !important;
    }

    /* Hero CTA row: wrap buttons */
    section div[style*="display: flex"][style*="gap: 12"] { flex-wrap: wrap !important; }

    /* Phone mock cells: keep mocks centered when stacked */
    div[style*="display: grid"] > div { justify-self: center; }
  }
</style>
</head>
<body class="fx-page">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Web.jsx"></script>
<script type="text/babel" src="Web_Bend.jsx"></script>
<script type="text/babel">
  function Site() {
    return (
      <>
        <FxNav/>
        <FxHero/>
        <FxStages/>
        <FxWhy/>
        <FxBend/>
        <FxConditions/>
        <FxHow/>
        <FxStories/>
        <FxPricing/>
        <FxFooter/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Site/>);
</script>
</body>
</html>
