<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitX — Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; color: var(--fx-fg-1); font-family: var(--fx-font-body); }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Lock layout to a print-friendly width so everything renders consistently */
  #root { width: 1100px; margin: 0 auto; }

  /* Disable hovers/animations */
  *, *::before, *::after { transition: none !important; animation: none !important; }

  /* Each section becomes a page; avoid splitting cards across pages */
  section { break-inside: avoid; page-break-inside: avoid; }
  section + section { break-before: page; page-break-before: always; }

  /* Sticky nav becomes a static header on print */
  header[style*="sticky"] { position: static !important; backdrop-filter: none !important; background: var(--fx-cream-200) !important; }

  @page { size: A4 landscape; margin: 0.5cm; }
  @media print {
    html, body { background: #fff; }
    #root { width: 100%; }
    /* Tighten section vertical padding so each page fills nicely */
    section { padding: 32px 0 !important; }
  }
</style>
</head>
<body class="fx-page">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Web.jsx"></script>
<script type="text/babel" src="Web_Bend.jsx"></script>
<script type="text/babel">
  function Site() {
    return (
      <>
        <FxNav/>
        <FxHero/>
        <FxStages/>
        <FxWhy/>
        <FxBend/>
        <FxConditions/>
        <FxHow/>
        <FxStories/>
        <FxPricing/>
        <FxFooter/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Site/>);

  // Auto-print after fonts + render settle
  (async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e) {}
    setTimeout(() => window.print(), 700);
  })();
</script>
</body>
</html>
